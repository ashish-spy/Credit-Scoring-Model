<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Scoring Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<div class="card">

<h1>🏦 Credit Scoring Prediction</h1>

<p class="subtitle">
Predict customer creditworthiness using Machine Learning
</p>

<form action="/predict" method="POST">

<div class="grid">

<div class="input-box">
<label>Checking Account Status</label>
<select name="laufkont" required>
<option value="">Select</option>
<option value="1">No Account</option>
<option value="2">Less than 0 DM</option>
<option value="3">0 - 200 DM</option>
<option value="4">More than 200 DM</option>
</select>
</div>

<div class="input-box">
<label>Loan Duration (Months)</label>
<input type="number" name="laufzeit" min="4" max="72" required>
</div>

<div class="input-box">
<label>Credit History</label>
<select name="moral" required>
<option value="">Select</option>
<option value="0">Critical Account</option>
<option value="1">Delayed Payment</option>
<option value="2">Existing Paid</option>
<option value="3">All Paid</option>
<option value="4">No Credits</option>
</select>
</div>

<div class="input-box">
<label>Loan Purpose</label>
<select name="verw" required>
<option value="">Select</option>
<option value="0">Car (New)</option>
<option value="1">Car (Used)</option>
<option value="2">Furniture</option>
<option value="3">Radio/TV</option>
<option value="4">Education</option>
<option value="5">Business</option>
<option value="6">Repairs</option>
<option value="7">Domestic Appliances</option>
<option value="8">Vacation</option>
<option value="9">Others</option>
</select>
</div>

<div class="input-box">
<label>Credit Amount</label>
<input type="number" name="hoehe" required>
</div>

<div class="input-box">
<label>Savings Account</label>
<select name="sparkont" required>
<option value="">Select</option>
<option value="1">Less than 100 DM</option>
<option value="2">100 - 500 DM</option>
<option value="3">500 - 1000 DM</option>
<option value="4">More than 1000 DM</option>
<option value="5">Unknown</option>
</select>
</div>

<div class="input-box">
<label>Employment Duration</label>
<select name="beszeit" required>
<option value="">Select</option>
<option value="1">Unemployed</option>
<option value="2">Less than 1 Year</option>
<option value="3">1 - 4 Years</option>
<option value="4">4 - 7 Years</option>
<option value="5">More than 7 Years</option>
</select>
</div>

<div class="input-box">
<label>Installment Rate</label>
<select name="rate" required>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
</select>
</div>

<div class="input-box">
<label>Personal Status</label>
<select name="famges" required>
<option value="1">Male Divorced</option>
<option value="2">Female</option>
<option value="3">Male Single</option>
<option value="4">Male Married</option>
</select>
</div>

<div class="input-box">
<label>Guarantor</label>
<select name="buerge" required>
<option value="1">None</option>
<option value="2">Co-Applicant</option>
<option value="3">Guarantor</option>
</select>
</div>

<div class="input-box">
<label>Residence Duration</label>
<input type="number" name="wohnzeit" min="1" max="4" required>
</div>

<div class="input-box">
<label>Property</label>
<select name="verm" required>
<option value="1">Real Estate</option>
<option value="2">Savings Insurance</option>
<option value="3">Car</option>
<option value="4">Unknown</option>
</select>
</div>

<div class="input-box">
<label>Age</label>
<input type="number" name="alter" min="18" max="90" required>
</div>

<div class="input-box">
<label>Other Installment Plans</label>
<select name="weitkred" required>
<option value="1">Bank</option>
<option value="2">Stores</option>
<option value="3">None</option>
</select>
</div>

<div class="input-box">
<label>Housing</label>
<select name="wohn" required>
<option value="1">Rent</option>
<option value="2">Own</option>
<option value="3">Free</option>
</select>
</div>

<div class="input-box">
<label>Existing Credits</label>
<input type="number" name="bishkred" min="1" max="4" required>
</div>

<div class="input-box">
<label>Job</label>
<select name="beruf" required>
<option value="1">Unemployed</option>
<option value="2">Unskilled</option>
<option value="3">Skilled</option>
<option value="4">Management / Self-employed</option>
</select>
</div>

<div class="input-box">
<label>Dependents</label>
<select name="pers" required>
<option value="1">1</option>
<option value="2">2 or More</option>
</select>
</div>

<div class="input-box">
<label>Telephone</label>
<select name="telef" required>
<option value="1">No</option>
<option value="2">Yes</option>
</select>
</div>

<div class="input-box">
<label>Foreign Worker</label>
<select name="gastarb" required>
<option value="1">Yes</option>
<option value="2">No</option>
</select>
</div>

</div>

<button type="submit">
Predict Credit Score
</button>
<button type="reset" class="reset-btn">
    Reset
</button>
</form>

{% if prediction %}

<div class="result">

    <h2>{{ prediction }}</h2>

    <h3>Confidence : {{ confidence }}%</h3>
    <p>{{ message }}</p>
    <div class="progress">

        <div class="progress-fill"
             style="width: {{ confidence }}%;">

        </div>

    </div>

</div>

{% endif %}

</div>

</div>

</body>
<footer>

Developed by Ashish Kumar © 2026

</footer>

</html>
